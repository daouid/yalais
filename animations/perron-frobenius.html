<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perron-Frobenius Theorem Explorer</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a24;
            --border-color: #e9ecef;
            --panel-bg: rgba(255, 255, 255, 0.72);
            --shadow-color: rgba(0, 0, 0, 0.05);
            --accent: #4c6ef5;
            --accent-glow: rgba(76, 110, 245, 0.2);
            --node-default: #f1f3f5;
            --color-v: #4c6ef5;
            --color-av: #fa5252;
            --color-eig: #fab005;
        }
        [data-theme="dark"] {
            --bg-color: #0b0c10;
            --text-color: #f8f9fa;
            --border-color: #242731;
            --panel-bg: rgba(18, 19, 26, 0.72);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --accent: #5c7cfa;
            --accent-glow: rgba(92, 124, 250, 0.3);
            --node-default: #12131a;
            --color-v: #748ffc;
            --color-av: #ff6b6b;
            --color-eig: #fcc419;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            max-width: 280px;
            width: calc(30% - 20px);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 10;
        }
        .panel-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .panel-desc {
            font-size: 11px;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .slider-group {
            margin-bottom: 8px;
        }
        .slider-label {
            font-size: 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            margin: 0;
        }
        .stat-line {
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .stat-val {
            font-family: monospace;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 6px 0;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="panel-title">Perron-Frobenius Map</div>
        <div class="panel-desc">Drag the vector <span style="color: var(--color-v); font-weight: bold;">v</span> to align it with its image <span style="color: var(--color-av); font-weight: bold;">Av</span>. The true positive eigenvector is in <span style="color: var(--color-eig); font-weight: bold;">Gold</span>.</div>
        
        <div class="stat-line"><span>Matrix A:</span><span id="matrix-val" class="stat-val">[1.2, 0.8; 0.4, 1.6]</span></div>
        <div class="stat-line"><span>Spectral Radius (λ₁):</span><span id="lambda-val" class="stat-val" style="color: var(--color-eig);">2.00</span></div>
        <div class="stat-line"><span>Angle Diff:</span><span id="angle-diff" class="stat-val">15.0°</span></div>
        
        <div class="panel-title" style="margin-top: 12px; font-size: 11px;">Matrix Sliders:</div>
        <div class="slider-group">
            <div class="slider-label"><span>a₁₁ (top-left)</span><span id="val-a">1.2</span></div>
            <input type="range" id="slide-a" min="0.1" max="3" step="0.1" value="1.2" oninput="updateMatrix()">
        </div>
        <div class="slider-group">
            <div class="slider-label"><span>a₁₂ (top-right)</span><span id="val-b">0.8</span></div>
            <input type="range" id="slide-b" min="0.1" max="3" step="0.1" value="0.8" oninput="updateMatrix()">
        </div>
        <div class="slider-group">
            <div class="slider-label"><span>a₂₁ (bottom-left)</span><span id="val-c">0.4</span></div>
            <input type="range" id="slide-c" min="0.1" max="3" step="0.1" value="0.4" oninput="updateMatrix()">
        </div>
        <div class="slider-group">
            <div class="slider-label"><span>a₂₂ (bottom-right)</span><span id="val-d">1.6</span></div>
            <input type="range" id="slide-d" min="0.1" max="3" step="0.1" value="1.6" oninput="updateMatrix()">
        </div>

        <div class="btn-group">
            <button onclick="runPowerIteration()">Power Iteration</button>
            <button onclick="resetVector()" style="background: var(--node-default); color: var(--text-color); border: 1px solid var(--border-color);">Reset v</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Matrix entries: A = [[a, b], [c, d]]
        let a = 1.2, b = 0.8, c = 0.4, d = 1.6;
        let lambda1 = 2.0;
        let eigX = 1.0, eigY = 1.0; // Eigenvector components

        // User vector v
        let vx = 1.0, vy = 0.2;
        let isDragging = false;

        // Theme Sync
        window.addEventListener('message', (event) => {
            if (event.data && event.data.theme) {
                document.documentElement.setAttribute('data-theme', event.data.theme);
                draw();
            }
        });
        window.parent.postMessage({ requestTheme: true }, '*');

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            draw();
        }
        window.addEventListener('resize', resize);

        function updateMatrix() {
            a = parseFloat(document.getElementById('slide-a').value);
            b = parseFloat(document.getElementById('slide-b').value);
            c = parseFloat(document.getElementById('slide-c').value);
            d = parseFloat(document.getElementById('slide-d').value);
            
            document.getElementById('val-a').textContent = a.toFixed(1);
            document.getElementById('val-b').textContent = b.toFixed(1);
            document.getElementById('val-c').textContent = c.toFixed(1);
            document.getElementById('val-d').textContent = d.toFixed(1);
            document.getElementById('matrix-val').textContent = `[${a.toFixed(1)}, ${b.toFixed(1)}; ${c.toFixed(1)}, ${d.toFixed(1)}]`;

            calculateEigenvalues();
            draw();
        }

        function calculateEigenvalues() {
            const trace = a + d;
            const det = a * d - b * c;
            const disc = Math.sqrt(trace * trace - 4 * det);
            lambda1 = (trace + disc) / 2; // Spectral radius

            // Eigenvector corresponding to lambda1:
            // (a - lambda1)x + b y = 0  => y = (lambda1 - a)/b * x
            // Since b > 0, we can choose x = 1, y = (lambda1 - a)/b
            eigX = 1.0;
            eigY = (lambda1 - a) / b;

            // Normalize eigenvector
            const len = Math.sqrt(eigX*eigX + eigY*eigY);
            eigX /= len;
            eigY /= len;

            document.getElementById('lambda-val').textContent = lambda1.toFixed(3);
        }

        function resetVector() {
            vx = 1.0;
            vy = 0.2;
            draw();
        }

        function runPowerIteration() {
            let iter = 0;
            function step() {
                if (iter >= 8) return;
                // v_next = A * v
                const nx = a * vx + b * vy;
                const ny = c * vx + d * vy;
                // Normalize
                const len = Math.sqrt(nx*nx + ny*ny);
                vx = nx / len;
                vy = ny / len;
                draw();
                iter++;
                setTimeout(step, 200);
            }
            step();
        }

        // Mouse/Touch Interaction
        function handlePointerMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            const clearSpace = w > 600 ? 280 : 0;
            
            // Origin at clearSpace + 80, h - 80
            const originX = clearSpace + 80;
            const originY = h - 80;

            const px = clientX - rect.left - originX;
            const py = originY - (clientY - rect.top); // Flip Y

            if (px > 0 && py > 0) { // Keep in first quadrant
                const len = Math.sqrt(px*px + py*py);
                vx = px / len;
                vy = py / len;
                draw();
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            handlePointerMove(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) handlePointerMove(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            if (e.touches[0]) handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches[0]) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
                e.preventDefault();
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        function draw() {
            const rect = canvas.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            
            ctx.clearRect(0, 0, w, h);
            
            const styles = getComputedStyle(document.documentElement);
            const textColor = styles.getPropertyValue('--text-color').trim();
            const borderColor = styles.getPropertyValue('--border-color').trim();
            const colorV = styles.getPropertyValue('--color-v').trim();
            const colorAv = styles.getPropertyValue('--color-av').trim();
            const colorEig = styles.getPropertyValue('--color-eig').trim();

            const clearSpace = w > 600 ? 280 : 0;
            const originX = clearSpace + 80;
            const originY = h - 80;
            const axisLength = Math.min(w - clearSpace - 160, h - 160);

            // 1. Draw Grid Lines & Axes
            ctx.beginPath();
            ctx.strokeStyle = borderColor + "66";
            ctx.lineWidth = 1;
            // Draw axes
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX + axisLength + 20, originY);
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX, originY - axisLength - 20);
            ctx.stroke();

            // Labels
            ctx.fillStyle = textColor;
            ctx.font = "italic 13px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("x₁", originX + axisLength + 35, originY + 4);
            ctx.fillText("x₂", originX, originY - axisLength - 30);

            // Draw unit circle arc in 1st quadrant
            ctx.beginPath();
            ctx.arc(originX, originY, axisLength, 0, -Math.PI / 2, true);
            ctx.strokeStyle = borderColor + "44";
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 2. Compute Av
            const avx = a * vx + b * vy;
            const avy = c * vx + d * vy;
            // Normalize Av for drawing direction
            const avLen = Math.sqrt(avx*avx + avy*avy);
            const navx = avx / avLen;
            const navy = avy / avLen;

            // Angle difference in degrees
            const angleV = Math.atan2(vy, vx);
            const angleAv = Math.atan2(navy, navx);
            const diffDeg = Math.abs((angleV - angleAv) * 180 / Math.PI);
            document.getElementById('angle-diff').textContent = `${diffDeg.toFixed(1)}°`;

            if (diffDeg < 0.8) {
                document.getElementById('angle-diff').style.color = colorEig;
            } else {
                document.getElementById('angle-diff').style.color = textColor;
            }

            // 3. Draw true positive eigenvector direction
            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX + eigX * (axisLength + 15), originY - eigY * (axisLength + 15));
            ctx.strokeStyle = colorEig;
            ctx.lineWidth = 2.5;
            ctx.setLineDash([6, 4]); // dashed line for eigenvector
            ctx.stroke();
            ctx.setLineDash([]); // reset

            ctx.fillStyle = colorEig;
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("Perron Eigenvector", originX + eigX * (axisLength + 20) + 4, originY - eigY * (axisLength + 20));

            // 4. Draw User Vector v
            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX + vx * axisLength, originY - vy * axisLength);
            ctx.strokeStyle = colorV;
            ctx.lineWidth = 3.5;
            ctx.stroke();

            // Arrowhead for v
            drawArrowhead(originX + vx * axisLength, originY - vy * axisLength, Math.atan2(-vy, vx), colorV);

            // 5. Draw Mapped Vector Av (Scaled down to fit well visually, e.g. same length as v)
            ctx.beginPath();
            ctx.moveTo(originX, originY);
            ctx.lineTo(originX + navx * axisLength, originY - navy * axisLength);
            ctx.strokeStyle = colorAv;
            ctx.lineWidth = 3.5;
            ctx.stroke();

            // Arrowhead for Av
            drawArrowhead(originX + navx * axisLength, originY - navy * axisLength, Math.atan2(-navy, navx), colorAv);

            // Vector Labels
            ctx.font = "bold 12px sans-serif";
            ctx.fillStyle = colorV;
            ctx.fillText("v", originX + vx * (axisLength - 15) - 10, originY - vy * (axisLength - 15) - 10);
            ctx.fillStyle = colorAv;
            ctx.fillText("Av", originX + navx * (axisLength - 15) + 12, originY - navy * (axisLength - 15) - 10);
        }

        function drawArrowhead(x, y, angle, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 12 * Math.cos(angle - Math.PI/6), y - 12 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(x - 12 * Math.cos(angle + Math.PI/6), y - 12 * Math.sin(angle + Math.PI/6));
            ctx.closePath();
            ctx.fill();
        }

        // Initialize
        calculateEigenvalues();
        resize();
    </script>
</body>
</html>
